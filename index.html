<!DOCTYPE html>

<html lang="ru">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Веломаршруты AI</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script src="https://cdn.tailwindcss.com"></script>

  

  <link rel="manifest" href="manifest.json">

  <meta name="theme-color" content="#1e40af">

  

  <style>

    #map { height: 100vh; width: 100%; }

    body { margin: 0; }

  </style>

</head>

<body>

  <div class="flex h-screen">

    <div class="w-80 bg-gray-800 p-4 overflow-auto">

      <h1 class="text-2xl font-bold mb-4">🚲 Веломаршруты AI</h1>

      

      <input id="start" value="Киев, Майдан" class="w-full p-3 bg-gray-700 rounded mb-2">

      <input id="end" value="Гидропарк" class="w-full p-3 bg-gray-700 rounded mb-4">



      <button onclick="buildRoute()" class="w-full py-3 bg-blue-600 rounded-xl mb-3">Построить маршрут</button>

      <button onclick="startRecording()" id="recordBtn" class="w-full py-3 bg-red-600 rounded-xl">● Начать запись</button>

      

      <div id="liveStats" class="hidden mt-4 p-3 bg-gray-700 rounded"></div>

    </div>

    <div id="map" class="flex-1"></div>

  </div>



  <script>

    let map, currentTrack = null, recording = false, trackPoints = [], startTime;



    function calculateDistance(points) {

      if (points.length < 2) return 0;

      let total = 0; const R = 6371;

      for (let i = 1; i < points.length; i++) {

        const lat1 = points[i-1][0] * Math.PI / 180;

        const lon1 = points[i-1][1] * Math.PI / 180;

        const lat2 = points[i][0] * Math.PI / 180;

        const lon2 = points[i][1] * Math.PI / 180;

        const dLat = lat2 - lat1, dLon = lon2 - lon1;

        const a = Math.sin(dLat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2;

        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

        total += R * c;

      }

      return total;

    }



    function initMap() {

      map = L.map('map').setView([50.4501, 30.5234], 13);

      L.tileLayer('https://{s}.tile-cyclosm.openstreetmap.fr/cyclosm/{z}/{x}/{y}.png').addTo(map);

    }



    function startRecording() {

      const btn = document.getElementById('recordBtn');

      if (recording) {

        recording = false;

        btn.textContent = "● Начать запись";

        btn.classList.remove('bg-red-600');

        btn.classList.add('bg-green-600');

        alert("Поездка завершена! Дистанция: " + calculateDistance(trackPoints).toFixed(2) + " км");

        return;

      }

      recording = true;

      trackPoints = [];

      startTime = Date.now();

      btn.textContent = "■ Стоп";

      btn.classList.remove('bg-green-600');

      btn.classList.add('bg-red-600');



      navigator.geolocation.watchPosition(p => {

        trackPoints.push([p.coords.latitude, p.coords.longitude]);

        if (currentTrack) map.removeLayer(currentTrack);

        currentTrack = L.polyline(trackPoints, {color: 'red', weight: 5}).addTo(map);

      }, null, {enableHighAccuracy: true});

    }



    window.onload = initMap;

  </script>

</body>

</html>
