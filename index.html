<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Веломаршруты AI</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e40af">

  <style>
    #map { height: 100vh; width: 100%; }
    body { margin: 0; padding: 0; overflow: hidden; }
    .sidebar { max-width: 380px; }
    @media (max-width: 768px) {
      .sidebar { max-width: 100%; height: 45%; position: absolute; bottom: 0; left: 0; right: 0; z-index: 1000; border-radius: 20px 20px 0 0; }
    }
  </style>
</head>
<body class="bg-gray-900 text-white">
  <div class="flex flex-col h-screen">
    <!-- Карта -->
    <div id="map" class="flex-1"></div>

    <!-- Боковая панель (на телефоне снизу) -->
    <div class="sidebar bg-gray-800 p-5 overflow-auto shadow-2xl">
      <h1 class="text-2xl font-bold mb-4 flex items-center gap-2">🚲 Веломаршруты AI</h1>
      
      <div class="space-y-3">
        <input id="start" value="Киев, Майдан Независимости" 
               class="w-full p-4 bg-gray-700 rounded-2xl text-lg" placeholder="Откуда...">
        
        <input id="end" value="Гидропарк" 
               class="w-full p-4 bg-gray-700 rounded-2xl text-lg" placeholder="Куда...">
      </div>

      <div class="grid grid-cols-2 gap-2 my-4">
        <button onclick="quickAI('easy')" class="py-3 bg-green-600 rounded-2xl font-medium">Лёгкий</button>
        <button onclick="quickAI('beautiful')" class="py-3 bg-purple-600 rounded-2xl font-medium">Красивый</button>
        <button onclick="quickAI('long')" class="py-3 bg-amber-600 rounded-2xl font-medium">Длинный</button>
        <button onclick="quickAI('nohill')" class="py-3 bg-blue-600 rounded-2xl font-medium">Без гор</button>
      </div>

      <button onclick="buildRoute()" 
              class="w-full py-4 bg-blue-600 hover:bg-blue-700 rounded-3xl text-lg font-semibold mb-3">
        🛣 Построить маршрут
      </button>

      <button onclick="startRecording()" id="recordBtn"
              class="w-full py-4 bg-red-600 hover:bg-red-700 rounded-3xl text-lg font-semibold">
        ● Начать запись поездки
      </button>

      <div id="liveStats" class="hidden mt-4 p-4 bg-gray-700 rounded-3xl"></div>
    </div>
  </div>

  <script>
    let map, currentRoute = null, currentTrack = null;
    let recording = false;
    let trackPoints = [];
    let startTime;

    // Точный расчёт дистанции
    function calculateDistance(points) {
      if (points.length < 2) return 0;
      let total = 0;
      const R = 6371;
      for (let i = 1; i < points.length; i++) {
        const lat1 = points[i-1][0] * Math.PI / 180;
        const lon1 = points[i-1][1] * Math.PI / 180;
        const lat2 = points[i][0] * Math.PI / 180;
        const lon2 = points[i][1] * Math.PI / 180;
        const dLat = lat2 - lat1;
        const dLon = lon2 - lon1;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon/2)**2;
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        total += R * c;
      }
      return total;
    }

    function initMap() {
      map = L.map('map', { zoomControl: true }).setView([50.4501, 30.5234], 13);
      
      L.tileLayer('https://{s}.tile-cyclosm.openstreetmap.fr/cyclosm/{z}/{x}/{y}.png', {
        maxZoom: 20,
        attribution: 'CyclOSM'
      }).addTo(map);
    }

    // Исправленный роутинг
    async function buildRoute() {
      const start = document.getElementById('start').value.trim();
      const end = document.getElementById('end').value.trim();
      
      if (!start || !end) return alert("Укажи точку старта и финиша");

      try {
        const startCoords = await geocode(start);
        const endCoords = await geocode(end);

        if (!startCoords || !endCoords) return alert("Не удалось найти одну из точек");

        const url = `https://router.project-osrm.org/route/v1/bike/\( {startCoords[1]}, \){startCoords[0]};\( {endCoords[1]}, \){endCoords[0]}?overview=full&geometries=polyline&steps=true`;

        const res = await fetch(url);
        const data = await res.json();

        if (data.routes && data.routes.length > 0) {
          const route = data.routes[0];
          const decoded = decodePolyline(route.geometry);

          if (currentRoute) map.removeLayer(currentRoute);
          
          currentRoute = L.polyline(decoded, {
            color: '#22d3ee',
            weight: 6,
            opacity: 0.9,
            lineJoin: 'round'
          }).addTo(map);

          map.fitBounds(currentRoute.getBounds(), { padding: [20, 20] });

          alert(`Маршрут построен!\nДистанция: ${(route.distance/1000).toFixed(1)} км\nВремя: ${Math.floor(route.duration/60)} мин`);
        }
      } catch (e) {
        alert("Ошибка построения маршрута. Проверь интернет.");
        console.error(e);
      }
    }

    async function geocode(address) {
      const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&limit=1`);
      const data = await res.json();
      return data[0] ? [parseFloat(data[0].lat), parseFloat(data[0].lon)] : null;
    }

    function decodePolyline(str) {
      let points = [], index = 0, lat = 0, lng = 0;
      while (index < str.length) {
        let shift = 0, result = 0, byte;
        do { byte = str.charCodeAt(index++) - 63; result |= (byte & 0x1f) << shift; shift += 5; } while (byte >= 0x20);
        lat += result & 1 ? \~(result >> 1) : (result >> 1);
        shift = result = 0;
        do { byte = str.charCodeAt(index++) - 63; result |= (byte & 0x1f) << shift; shift += 5; } while (byte >= 0x20);
        lng += result & 1 ? \~(result >> 1) : (result >> 1);
        points.push([lat / 1e5, lng / 1e5]);
      }
      return points;
    }

    function quickAI(mode) {
      const prompts = {
        easy: "Сделай лёгкий маршрут без сильных подъёмов",
        beautiful: "Сделай красивый маршрут через приятные места",
        long: "Сделай длинный маршрут",
        nohill: "Сделай маршрут без гор"
      };
      alert(`🤖 ИИ: ${prompts[mode]}\n\nСейчас построю...`);
      buildRoute();
    }

    // Запись поездки
    function startRecording() {
      const btn = document.getElementById('recordBtn');
      if (recording) {
        recording = false;
        btn.textContent = "● Начать запись поездки";
        btn.classList.replace('bg-red-600', 'bg-green-600');
        const dist = calculateDistance(trackPoints).toFixed(2);
        alert(`✅ Поездка завершена!\n\n📏 Дистанция: ${dist} км`);
        return;
      }

      recording = true;
      trackPoints = [];
      startTime = Date.now();
      btn.textContent = "■ Остановить запись";
      btn.classList.replace('bg-green-600', 'bg-red-600');

      document.getElementById('liveStats').classList.remove('hidden');

      navigator.geolocation.watchPosition(pos => {
        if (!recording) return;
        trackPoints.push([pos.coords.latitude, pos.coords.longitude]);
        
        if (currentTrack) map.removeLayer(currentTrack);
        currentTrack = L.polyline(trackPoints, { color: '#ef4444', weight: 5 }).addTo(map);

        updateLiveStats();
      }, () => {}, { enableHighAccuracy: true, maximumAge: 0 });
    }

    function updateLiveStats() {
      const elapsed = Math.floor((Date.now() - startTime) / 60000);
      const dist = calculateDistance(trackPoints).toFixed(2);
      document.getElementById('liveStats').innerHTML = `
        <p class="text-lg">⏱ ${elapsed} минут</p>
        <p class="text-cyan-400 text-xl font-bold">${dist} км</p>
      `;
    }

    // Запуск
    window.onload = initMap;
  </script>
</body>
</html>
