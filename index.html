<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VeloTracker Pro</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#10b981">

  <style>
    #map { height: 100vh; width: 100%; }
    body { margin: 0; padding: 0; font-family: system-ui; }
    .bottom-nav { height: 65px; }
  </style>
</head>
<body class="bg-zinc-950 text-white">
  
  <!-- Верхняя панель -->
  <div class="bg-zinc-900 border-b border-zinc-800 px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <span class="text-2xl">🚲</span>
      <div>
        <h1 class="text-xl font-bold text-emerald-400">VeloTracker Pro</h1>
        <p class="text-xs text-zinc-500">Киев • 15:46</p>
      </div>
    </div>
    <div class="bg-zinc-800 text-xs px-3 py-1 rounded-xl flex items-center gap-1">
      <span class="text-orange-400">📦</span> GPX
    </div>
  </div>

  <div class="relative h-[calc(100vh-130px)]">
    <!-- Карта -->
    <div id="map" class="absolute inset-0"></div>

    <!-- Поиск -->
    <div class="absolute top-4 left-4 right-4">
      <div class="bg-zinc-900/90 backdrop-blur-md border border-zinc-700 rounded-3xl p-2 flex">
        <input id="search" placeholder="Магазин, кафе, АЗС..." 
               class="flex-1 bg-transparent px-4 outline-none text-base">
        <button onclick="buildRoute()" 
                class="bg-emerald-500 hover:bg-emerald-600 px-6 py-2 rounded-3xl font-medium">
          Найти
        </button>
      </div>
    </div>

    <!-- Статистика на карте -->
    <div id="liveStats" class="hidden absolute top-24 left-4 bg-zinc-900/95 backdrop-blur-md border border-zinc-700 rounded-3xl p-4 shadow-2xl">
      <div class="grid grid-cols-3 gap-4 text-center">
        <div>
          <div class="text-emerald-400 text-xl font-bold" id="dist">0.0</div>
          <div class="text-xs text-zinc-400">км</div>
        </div>
        <div>
          <div class="text-emerald-400 text-xl font-bold" id="time">00:00</div>
          <div class="text-xs text-zinc-400">время</div>
        </div>
        <div>
          <div class="text-emerald-400 text-xl font-bold" id="speed">0</div>
          <div class="text-xs text-zinc-400">км/ч</div>
        </div>
      </div>
    </div>

    <!-- Нижние кнопки -->
    <div class="absolute bottom-20 left-4 right-4 flex gap-3">
      <button onclick="startRecording()" id="recordBtn"
              class="flex-1 bg-red-600 hover:bg-red-700 py-4 rounded-3xl text-lg font-semibold flex items-center justify-center gap-2">
        <span class="text-xl">●</span> Начать запись
      </button>
      
      <button onclick="buildRoute()" 
              class="flex-1 bg-zinc-800 hover:bg-zinc-700 py-4 rounded-3xl text-lg font-semibold">
        ⚡ Построить маршрут
      </button>
    </div>
  </div>

  <!-- Нижняя навигация -->
  <div class="bottom-nav fixed bottom-0 left-0 right-0 bg-zinc-900 border-t border-zinc-800 flex items-center justify-around text-xs">
    <div onclick="switchTab(0)" class="flex flex-col items-center text-emerald-400">
      <span class="text-2xl">🗺️</span>
      <span>Карта</span>
    </div>
    <div onclick="switchTab(1)" class="flex flex-col items-center text-zinc-400 hover:text-white">
      <span class="text-2xl">📊</span>
      <span>Анализ+ИИ</span>
    </div>
    <div onclick="switchTab(2)" class="flex flex-col items-center text-zinc-400 hover:text-white">
      <span class="text-2xl">⚙️</span>
      <span>Ещё</span>
    </div>
  </div>

  <script>
    let map, currentTrack = null, recording = false, trackPoints = [], startTime;

    function calculateDistance(points) { /* та же функция что раньше */ 
      if (points.length < 2) return 0;
      let total = 0; const R = 6371;
      for (let i = 1; i < points.length; i++) {
        const lat1 = points[i-1][0] * Math.PI / 180;
        const lon1 = points[i-1][1] * Math.PI / 180;
        const lat2 = points[i][0] * Math.PI / 180;
        const lon2 = points[i][1] * Math.PI / 180;
        const dLat = lat2 - lat1, dLon = lon2 - lon1;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2;
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        total += R * c;
      }
      return total;
    }

    function initMap() {
      map = L.map('map').setView([50.4501, 30.5234], 13);
      L.tileLayer('https://{s}.tile-cyclosm.openstreetmap.fr/cyclosm/{z}/{x}/{y}.png', {
        maxZoom: 20
      }).addTo(map);
    }

    function startRecording() {
      const btn = document.getElementById('recordBtn');
      if (recording) {
        recording = false;
        btn.innerHTML = `<span class="text-xl">●</span> Начать запись`;
        btn.classList.replace('bg-red-600', 'bg-emerald-600');
        const dist = calculateDistance(trackPoints).toFixed(1);
        alert(`Поездка завершена!\nДистанция: ${dist} км`);
        return;
      }
      
      recording = true;
      trackPoints = [];
      startTime = Date.now();
      btn.innerHTML = `■ Остановить`;
      btn.classList.replace('bg-emerald-600', 'bg-red-600');
      document.getElementById('liveStats').classList.remove('hidden');

      navigator.geolocation.watchPosition(pos => {
        trackPoints.push([pos.coords.latitude, pos.coords.longitude]);
        if (currentTrack) map.removeLayer(currentTrack);
        currentTrack = L.polyline(trackPoints, {color: '#ef4444', weight: 6}).addTo(map);
        updateLiveStats();
      }, null, {enableHighAccuracy: true});
    }

    function updateLiveStats() {
      const elapsed = Math.floor((Date.now() - startTime)/60000);
      const dist = calculateDistance(trackPoints).toFixed(1);
      document.getElementById('dist').textContent = dist;
      document.getElementById('time').textContent = elapsed + ":00";
    }

    function buildRoute() {
      alert("Маршрут будет построен (в следующей версии добавим полный роутинг)");
    }

    function switchTab(n) {
      alert("Вкладка " + (n===1 ? "Анализ+ИИ" : n===2 ? "Ещё" : "Карта"));
    }

    window.onload = initMap;
  </script>
</body>
</html>
